sample_dashboards:
  - 
    category: Apigee
    id: health-availability
    display_name: Apigee API Health & Availability
    description: |-
      This dashboard is for [Apigee](https://cloud.google.com/apigee).
      This dashboard provides high-level health and availability monitoring for Apigee proxies, including request rates and error breakdowns by proxy.
    related_integrations:
      - id: apigee
        platform: GCP
  -
    category: Apigee
    id: hybrid-cassandra-monitoring
    display_name: Apigee Hybrid Cassandra Monitoring
    description: |-
      This dashboard is for [Apigee Hybrid](https://cloud.google.com/apigee/hybrid). 
      This dashboard has 6 charts to display Cassandra metrics. The metrics include Client READ Request Rate, Client WRITE Request Rate, Read Request Latency, Write Request Latency, CPU Request Utilization, etc.
  -
    category: Apigee
    id: hybrid-infrastructure-monitoring
    display_name: Apigee Hybrid Infrastructure Monitoring
    description: |-
      This dashboard is for [Apigee Hybrid](https://cloud.google.com/apigee/hybrid). 
      This dashboard has 4 charts to display Kubernetes pod and container metrics. The metrics include CPU limit utilization, Memory limit utilization, Restart count, Network Received Bytes, etc.
